[mysqld]
# Por defecto MariaDB solo escucha en 127.0.0.1 (localhost).
# Cambiamos a 0.0.0.0 para aceptar conexiones desde la red
# interna de Docker (el contenedor de WordPress necesita conectar).
bind-address = 0.0.0.0
