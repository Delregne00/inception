# ============================================================
#  NGINX - Configuración del servidor virtual
# ============================================================

server {

    # ── Puerto y protocolo ───────────────────────────────────
    # Solo HTTPS (443). El subject prohíbe HTTP (puerto 80).
    listen 443 ssl;
    listen [::]:443 ssl;

    # Dominio del proyecto. Debe coincidir con la entrada en /etc/hosts.
    server_name acarranz.42.fr;

    # ── Certificados SSL ─────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # El subject exige TLSv1.2 o TLSv1.3 ÚNICAMENTE.
    # TLS 1.0 y 1.1 están obsoletos y son vulnerables (POODLE, BEAST).
    ssl_protocols TLSv1.2 TLSv1.3;

    # ── Raíz del sitio ───────────────────────────────────────
    # Volumen compartido con el contenedor de WordPress.
    root  /var/www/html;
    index index.php index.html;

    # ── Archivos estáticos ───────────────────────────────────
    # try_files primero busca el archivo, luego como directorio,
    # y si no existe lo pasa a index.php (URLs bonitas de WordPress).
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP via FastCGI ──────────────────────────────────────
    # Nginx NO ejecuta PHP. Delega las peticiones .php al
    # contenedor wordpress via el protocolo FastCGI.
    location ~ \.php$ {
        include fastcgi_params;

        # "wordpress" es el nombre del servicio en docker-compose.
        # Docker lo resuelve automáticamente a la IP del contenedor.
        # Puerto 9000: donde PHP-FPM escucha (ver Dockerfile de WP).
        fastcgi_pass wordpress:9000;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
