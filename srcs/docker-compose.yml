# ============================================================
#  DOCKER-COMPOSE - Inception
#  Orquesta los tres servicios: mariadb, wordpress, nginx
# ============================================================

services:

  # ── BASE DE DATOS ─────────────────────────────────────────
  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb
    restart: always
    env_file:
      - .env
    # Secrets montados como archivos en /run/secrets/
    # Los scripts de setup los leen desde ahí (sin exponer en env)
    secrets:
      - db_password
      - db_root_password
    networks:
      - inception_network
    volumes:
      - db_data:/var/lib/mysql

  # ── WORDPRESS (PHP-FPM) ───────────────────────────────────
  wordpress:
    container_name: wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress
    restart: always
    depends_on:
      - mariadb
    env_file:
      - .env
    secrets:
      - db_password
      - credentials
    networks:
      - inception_network
    volumes:
      - wp_data:/var/www/html

  # ── NGINX (único punto de entrada, puerto 443) ────────────
  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx
    restart: always
    depends_on:
      - wordpress
    ports:
      - "443:443"
    networks:
      - inception_network
    volumes:
      - wp_data:/var/www/html

# ── SECRETS ──────────────────────────────────────────────────
# Docker lee estos archivos y los monta en /run/secrets/<nombre>
# dentro de los contenedores que los declaren.
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt

# ── RED ──────────────────────────────────────────────────────
# Red bridge interna: los contenedores se ven entre sí por nombre
# (ej: wordpress conecta a "mariadb:3306") pero están aislados
# del exterior. Solo nginx expone el puerto 443 al host.
networks:
  inception_network:
    driver: bridge

# ── VOLÚMENES ─────────────────────────────────────────────────
# Volúmenes con nombre que persisten los datos en disco.
# Se almacenan en /home/login/data/ según exige el subject.
volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/mariadb
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/wordpress
